<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch Design Animenia - Task Manager</title>
    <link rel="stylesheet" href="../src/styles/style.css">
    <link rel="icon" href="../assets/icons/favicon.svg" type="image/svg+xml">
</head>
<body>
    <header>
        <div class="container">
            <h1>Task Manager</h1>
            <p>Stay organized, stay productive</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit">Add Task</button>
            </form>
            <ul id="todo-list"></ul>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; <span id="year"></span> Stitch Design Animenia. All rights reserved.</p>
        </div>
    </footer>
    <script src="../src/main.js"></script>
</body>
</html>
